<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation canceled — MLR-X</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0c1c2f, #0d1423);
      color: #e9f0ff;
    }
    .card {
      max-width: 640px;
      width: min(90vw, 640px);
      padding: 2.5rem;
      border-radius: 18px;
      background: rgba(18, 32, 52, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 0.75rem; letter-spacing: -0.01em; }
    p { color: #cbd6eb; line-height: 1.6; }
    .actions { margin-top: 1.5rem; display: flex; gap: 0.8rem; flex-wrap: wrap; }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.3rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }
    .primary { background: linear-gradient(135deg, #00c896, #4dd0ff); color: #0b1524; box-shadow: 0 12px 36px rgba(0, 200, 150, 0.35); }
    .secondary { background: rgba(255, 255, 255, 0.06); color: #e9f0ff; }
    a.button:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Donation canceled</h1>
    <p>We didn’t process your donation this time. If you canceled by accident or want to try again, you can return to the donation page. Either way, thank you for considering supporting MLR-X.</p>
    <div class="actions">
      <a class="button primary" href="../">Return to donation page</a>
      <a class="button secondary" href="https://jacksonalcazar.github.io/MLR-X">Back to MLR-X home</a>
    </div>
  </main>
</body>
</html>
